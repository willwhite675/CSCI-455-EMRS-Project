<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, interactive-widget=resizes-content">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="patients.css">

    <link rel="stylesheet" href="https://cdn.datatables.net/2.3.7/css/dataTables.dataTables.css" />
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/2.3.7/js/dataTables.js"></script>

    <title>Health Inc - Patients</title>
</head>
<body>
<div id="topNavContainer"></div>
<div id="pageContent">
    <div id="sideNavContainer"></div>
    <div class="container">
        <button id="addPatientButton" class="standardButton">Add Patient</button>
        <dialog id="addPatientDialog">
            <div id="closeDialogContainer">
                <button id="closeAddPatientDialogButton" class="standardButton">X</button>
            </div>
            <form id="addPatientForm">
                <label for="ID">ID:</label>
                <input type="text" id="ID" name="ID" required>
                <label for="providerID">Provider ID:</label>
                <input type="text" id="providerID" name="email" required>
                <label for="departmentList">Department:</label>
                <select id="departmentList" name="department">
                    <option disabled selected>Select Department</option>

                </select>
                <button type="submit" id="savePatientButton" class="standardButton">Save</button>
            </form>
        </dialog>
        <table id="patientsTable">
            <thead id="patientTableHeader">
            <tr id="patientTableLabels">
                <th>Name</th>
                <th>Gender</th>
                <th>DOB</th>
                <th>Phone</th>
                <th>Email</th>
                <th>Insurance</th>
            </tr>
            </thead>
            <tbody id="patientTableBody">

            </tbody>
        </table>
        <div id="recordView">
            <div id="recordContent">
                <h2 id="recordTitle"></h2>
                <div id="recordInfo"></div>
            </div>
        </div>
    </div>
</div>
</body>
<script src="../topNavBar.js"></script>
<script src="../sideNavBar.js"></script>
<script src="patients.js"></script>
<script src="../router.js"></script>
<script>
    if (typeof Router !== 'undefined') {
        new Router('pageContent');
    }
</script>
</html>
