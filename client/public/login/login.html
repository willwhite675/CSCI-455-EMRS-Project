<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, interactive-widget=resizes-content">
    <link rel="stylesheet" href="login.css">
    <title>Health Inc</title>
</head>
<body>
<div class="loginPanel">
    <div class="logo">
        <span>Health Inc</span>
    </div>
    <h1>Welcome to Health Inc</h1>
    <div class="usernameContainer">
        <label for="username" id="usernameLabel">Username</label>
        <input type="text" aria-label="username" id="username">
    </div>
    <div class="passwordContainer">
        <label for="password" id="passwordLabel">Password</label>
        <input type="text" aria-label="password" id="password">
    </div>
    <div class="submitButtonContainer">
        <button class="submitButton" id="submitButton">Submit</button>
    </div>
</div>
</body>
</html>
