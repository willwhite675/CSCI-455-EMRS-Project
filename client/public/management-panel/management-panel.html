<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, interactive-widget=resizes-content">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="management-panel.css">

    <link rel="stylesheet" href="https://cdn.datatables.net/2.3.7/css/dataTables.dataTables.css" />
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/2.3.7/js/dataTables.js"></script>

    <title>Health Inc - Settings</title>
</head>
<body>
<div id="topNavContainer"></div>
<div id="pageContent">
    <div id="sideNavContainer"></div>
    <div class="container">
        <button id="addEmployeeButton" class="standardButton">Add Employee</button>
        <dialog id="addEmployeeDialog">
            <div id="closeDialogContainer">
                <button id="closeAddEmployeeDialogButton" class="standardButton">X</button>
            </div>
            <form id="addEmployeeForm">
                <p>Please fill out all fields to add a new employee.</p>
                <label for="ID">ID:</label>
                <input type="text" id="ID" name="ID" required>
                <label for="providerID">Provider ID:</label>
                <input type="text" id="providerID" name="email" required>
                <label for="departmentList">Department:</label>
                <select id="departmentList" name="department">
                    <option disabled selected>Select Department</option>

                </select>
                <button type="submit" id="saveEmployeeButton" class="standardButton">Save</button>
            </form>
        </dialog>
        <table id="employeeTable">
            <thead id="employeeTableHeader">
                    <tr id="employeeTableLabels">
                    <th>ID</th>
                    <th>Name</th>
                    <th>Provider ID</th>
                    <th>Department</th>
                    <th>Department Number</th>
                        <th></th>
                </tr>
            </thead>
            <tbody id="employeeTableBody">

            </tbody>
        </table>
    </div>
</div>
</body>
<script src="../topNavBar.js"></script>
<script src="../sideNavBar.js"></script>
<script src="management-panel.js"></script>
<script src="../router.js"></script>
<script>
    if (typeof Router !== 'undefined') {
        new Router('pageContent');
    }
</script>

</html>
